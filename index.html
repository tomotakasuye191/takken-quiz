<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宅建 暗記道場 全科目</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F6F1E6;
  --paper-deep:#ECE3D0;
  --ink:#222A3D;
  --ink-soft:#5B5A50;
  --gold:#B8923C;
  --hanko:#AE3B33;
  --seal:#3F6E5E;
  --line:#D8CDB6;
  --unseen:#A39A86;
  --wakaranai:#B87B2A;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--paper);}
body{
  font-family:'Noto Sans JP',sans-serif;color:var(--ink);line-height:1.7;
  background-image:repeating-linear-gradient(0deg,rgba(0,0,0,.015) 0,rgba(0,0,0,.015) 1px,transparent 1px,transparent 26px);
}

/* ── LAYOUT ── */
.layout{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{
  width:196px;flex-shrink:0;background:#fff;
  border-right:2px solid var(--line);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.sidebar-head{padding:18px 14px 12px;border-bottom:2px double var(--ink);}
.sidebar-head .app-title{
  font-family:'Shippori Mincho',serif;font-size:16px;font-weight:800;
  display:flex;align-items:center;gap:8px;
}
.sidebar-head .logo-stamp{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:50%;border:2px solid var(--hanko);
  color:var(--hanko);font-size:9px;font-weight:900;font-family:'Shippori Mincho',serif;
  transform:rotate(-8deg);flex-shrink:0;
}
.sidebar-head .app-sub{font-size:10px;color:var(--ink-soft);margin-top:3px;}

.sidebar-modules{padding:8px 0;flex:1;}
.mod-btn{
  display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;
  border:none;background:none;text-align:left;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;
  color:var(--ink-soft);border-left:3px solid transparent;transition:.15s;
}
.mod-btn:hover{background:var(--paper);color:var(--ink);}
.mod-btn.active{background:var(--paper);color:var(--ink);}
.mod-btn .mod-stamp{
  display:inline-flex;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:50%;border:1.5px solid currentColor;
  font-size:8px;font-weight:900;font-family:'Shippori Mincho',serif;flex-shrink:0;opacity:.7;
}
.mod-btn.active .mod-stamp{opacity:1;}
.mod-btn .mod-count{margin-left:auto;font-size:9px;font-weight:400;color:var(--ink-soft);}
.sidebar-footer{padding:10px 12px;border-top:1px solid var(--line);}
.sidebar-footer button{font-size:10px;color:var(--ink-soft);text-decoration:underline;background:none;border:none;cursor:pointer;font-family:inherit;display:block;margin-bottom:4px;}

/* MOBILE TOP NAV */
.topnav{display:none;background:#fff;border-bottom:2px solid var(--line);position:sticky;top:0;z-index:100;}
.topnav-head{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--line);}
.topnav-head .app-title{font-family:'Shippori Mincho',serif;font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;}
.topnav-head .logo-stamp{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;border:2px solid var(--hanko);color:var(--hanko);font-size:8px;font-weight:900;font-family:'Shippori Mincho',serif;transform:rotate(-8deg);flex-shrink:0;}
.topnav-tabs{display:flex;overflow-x:auto;scrollbar-width:none;}
.topnav-tabs::-webkit-scrollbar{display:none;}
.topnav-tab{flex-shrink:0;padding:7px 12px;border:none;background:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:700;color:var(--ink-soft);border-bottom:3px solid transparent;white-space:nowrap;}
.topnav-tab.active{color:var(--ink);}

/* MAIN */
.main{flex:1;min-width:0;padding:0 0 60px;}
.module-panel{display:none;max-width:720px;margin:0 auto;padding:22px 16px;}
.module-panel.active{display:block;}

/* INNER APP */
.app-head{border-bottom:3px double var(--ink);padding:20px 0 14px;margin-bottom:18px;position:relative;}
.app-head .eyebrow{font-size:11px;letter-spacing:.25em;font-weight:700;margin-bottom:4px;}
.app-head h1{font-family:'Shippori Mincho',serif;font-size:24px;font-weight:800;display:flex;align-items:center;gap:10px;}
.app-head h1 .stamp{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;border:2.5px solid;font-size:12px;font-weight:900;font-family:'Shippori Mincho',serif;transform:rotate(-8deg);flex-shrink:0;}
.app-head p.sub{margin:5px 0 0;color:var(--ink-soft);font-size:12px;}
.reset-link{position:absolute;top:20px;right:0;font-size:11px;color:var(--ink-soft);text-decoration:underline;cursor:pointer;background:none;border:none;font-family:inherit;}

nav.tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
nav.tabs button{font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;padding:7px 13px;border:1.5px solid var(--ink);background:transparent;color:var(--ink);border-radius:2px;cursor:pointer;transition:.15s;}
nav.tabs button.active{background:var(--ink);color:var(--paper);}
nav.tabs button:hover:not(.active){background:rgba(34,42,61,.08);}
.view{display:none;}
.view.active{display:block;}
h2.section-title{font-family:'Shippori Mincho',serif;font-size:17px;font-weight:700;margin:0 0 11px;padding-left:10px;border-left:4px solid var(--gold);}

.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px;}
@media(min-width:520px){.stat-grid{grid-template-columns:repeat(4,1fr);}}
.stat-card{background:#fff;border:1px solid var(--line);border-radius:4px;padding:12px 8px;text-align:center;}
.stat-card .num{font-family:'Shippori Mincho',serif;font-size:24px;font-weight:800;}
.stat-card .label{font-size:10px;color:var(--ink-soft);margin-top:2px;letter-spacing:.04em;}
.stat-card.weak .num{color:var(--hanko);}
.stat-card.known .num{color:var(--seal);}
.stat-card.unseen .num{color:var(--unseen);}

.launch-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:22px;}
@media(min-width:500px){.launch-grid{grid-template-columns:1fr 1fr;}}
.launch-card{background:#fff;border:1px solid var(--line);border-radius:4px;padding:13px;cursor:pointer;text-align:left;transition:.15s;font-family:inherit;}
.launch-card:hover:not(:disabled){border-color:var(--ink);box-shadow:2px 2px 0 var(--line);}
.launch-card:disabled{opacity:.42;cursor:not-allowed;}
.launch-card .lc-title{font-weight:700;font-size:13px;margin-bottom:3px;display:flex;align-items:center;gap:6px;}
.launch-card .lc-desc{font-size:11px;color:var(--ink-soft);}
.launch-card .lc-count{display:inline-block;font-size:9px;font-weight:700;background:var(--paper-deep);border-radius:10px;padding:2px 7px;margin-left:auto;}

.chapter-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--line);font-size:11px;}
.chapter-row .ch-name{width:42px;font-weight:700;flex-shrink:0;}
.chapter-row .ch-bar{flex:1;height:8px;border-radius:4px;overflow:hidden;display:flex;background:var(--paper-deep);}
.chapter-row .ch-bar span{display:block;height:100%;}
.chapter-row .ch-count{width:44px;text-align:right;color:var(--ink-soft);font-size:10px;flex-shrink:0;}

details.chapter-block{background:#fff;border:1px solid var(--line);border-radius:4px;margin-bottom:7px;overflow:hidden;}
details.chapter-block summary{padding:10px 13px;font-weight:700;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;font-family:'Shippori Mincho',serif;font-size:14px;}
details.chapter-block summary::-webkit-details-marker{display:none;}
details.chapter-block summary .ch-tally{font-size:10px;font-weight:400;color:var(--ink-soft);font-family:'Noto Sans JP',sans-serif;}
.fact-row{padding:10px 13px;border-top:1px solid var(--line);font-size:12.5px;}
.fact-row .fact-text{margin-bottom:6px;}
.fact-row .fact-controls{display:flex;gap:4px;flex-wrap:wrap;}
.status-btn{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;border:1.5px solid var(--line);background:#fff;cursor:pointer;color:var(--ink-soft);font-family:inherit;}
.status-btn.sel-weak{border-color:var(--hanko);background:var(--hanko);color:#fff;}
.status-btn.sel-known{border-color:var(--seal);background:var(--seal);color:#fff;}
.status-btn.sel-unseen{border-color:var(--unseen);background:var(--unseen);color:#fff;}
.status-btn.edit-btn{border-color:var(--gold);color:var(--gold);}
.status-btn.edit-btn:hover{background:var(--gold);color:#fff;}

/* EDIT/ADD FACT MODAL */
.edit-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1100;align-items:center;justify-content:center;padding:16px;}
.edit-modal-overlay.show{display:flex;}
.edit-modal{background:var(--paper);border:2px solid var(--ink);border-radius:6px;padding:24px 22px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;}
.edit-modal h3{font-family:'Shippori Mincho',serif;font-size:18px;margin-bottom:6px;}
.edit-modal p.hint{font-size:12px;color:var(--ink-soft);margin-bottom:12px;line-height:1.7;}
.edit-modal label{font-size:12px;font-weight:700;display:block;margin-bottom:4px;margin-top:10px;}
.edit-modal textarea{width:100%;min-height:80px;padding:9px 10px;border:1.5px solid var(--line);border-radius:3px;font-family:inherit;font-size:13px;background:#fff;resize:vertical;}
.edit-modal input[type=text]{width:100%;padding:9px 10px;border:1.5px solid var(--line);border-radius:3px;font-family:inherit;font-size:13px;background:#fff;}
.edit-modal textarea:focus,.edit-modal input:focus{outline:none;border-color:var(--ink);}
.edit-modal select{width:100%;padding:9px 10px;border:1.5px solid var(--line);border-radius:3px;font-family:inherit;font-size:13px;background:#fff;}
.edit-modal .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}
.edit-modal .danger-link{font-size:11px;color:var(--hanko);text-decoration:underline;background:none;border:none;cursor:pointer;font-family:inherit;margin-top:10px;}
.edit-modal .gen-status{font-size:12px;color:var(--ink-soft);margin-top:10px;display:flex;align-items:center;gap:6px;}
.edit-modal .q-field-block{background:#fff;border:1px solid var(--line);border-radius:4px;padding:10px 12px;margin-top:10px;}
.edit-modal .q-field-block label{margin-top:6px;}
.edit-modal .q-field-block label:first-child{margin-top:0;}

/* EXPORT MODAL */
#exportModalBox h3{font-family:'Shippori Mincho',serif;font-size:18px;margin-bottom:10px;}
#exportModalBox .export-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
#exportModalBox .export-tab{font-size:12px;font-weight:700;padding:6px 12px;border:1.5px solid var(--line);border-radius:2px;background:#fff;cursor:pointer;font-family:inherit;color:var(--ink-soft);}
#exportModalBox .export-tab.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
#exportModalBox .export-count{font-size:12px;color:var(--ink-soft);margin-bottom:8px;}
#exportModalBox .export-count strong{color:var(--hanko);}
#exportModalBox textarea.export-text{width:100%;min-height:280px;padding:10px 12px;border:1.5px solid var(--line);border-radius:3px;font-family:'Noto Sans JP',sans-serif;font-size:12px;background:#fff;resize:vertical;line-height:1.8;}
#exportModalBox .empty-export{text-align:center;padding:30px;color:var(--ink-soft);font-size:13px;}

/* QUIZ */
.quiz-progress{font-size:11px;color:var(--ink-soft);margin-bottom:4px;letter-spacing:.04em;}
.quiz-progress-bar{height:4px;background:var(--paper-deep);border-radius:3px;margin-bottom:18px;overflow:hidden;}
.quiz-progress-bar span{display:block;height:100%;background:var(--gold);}
.quiz-tag{display:inline-block;font-size:10px;font-weight:700;color:var(--gold);border:1px solid var(--gold);border-radius:3px;padding:1px 7px;margin-bottom:7px;letter-spacing:.1em;}
.question-card{background:#fff;border:1px solid var(--line);border-radius:4px;padding:20px 16px;margin-bottom:14px;box-shadow:3px 3px 0 var(--paper-deep);}
.question-card .stmt{font-size:15.5px;font-weight:500;line-height:1.9;}

/* 3-button answer row */
.answer-buttons{display:flex;gap:12px;justify-content:center;align-items:center;margin:18px 0;flex-wrap:wrap;}
.stamp-btn{
  width:82px;height:82px;border-radius:50%;background:#fff;
  font-family:'Shippori Mincho',serif;font-size:30px;font-weight:800;
  cursor:pointer;transition:.13s;border:3px solid;
}
.stamp-btn.maru{border-color:var(--seal);color:var(--seal);}
.stamp-btn.maru:hover{background:#f0f6f3;transform:scale(1.06) rotate(-3deg);}
.stamp-btn.batsu{border-color:var(--hanko);color:var(--hanko);}
.stamp-btn.batsu:hover{background:#fdf4f2;transform:scale(1.06) rotate(3deg);}
.stamp-btn.wakaranai{
  width:auto;height:auto;border-radius:30px;padding:10px 18px;
  border-color:var(--wakaranai);color:var(--wakaranai);
  font-size:13px;font-weight:700;letter-spacing:.05em;
  font-family:'Noto Sans JP',sans-serif;
}
.stamp-btn.wakaranai:hover{background:#fdf6ed;transform:scale(1.04);}
.stamp-btn:disabled{opacity:.33;cursor:default;transform:none !important;}

.result-banner{border-radius:4px;padding:11px 13px;margin-bottom:9px;font-weight:700;display:flex;align-items:center;gap:8px;font-size:14px;}
.result-banner.correct{background:#EAF3EF;color:var(--seal);border:1px solid var(--seal);}
.result-banner.wrong{background:#F8ECEA;color:var(--hanko);border:1px solid var(--hanko);}
.result-banner.skip{background:#FDF6ED;color:var(--wakaranai);border:1px solid var(--wakaranai);}
.explanation-box{background:var(--paper-deep);border-radius:4px;padding:11px 13px;font-size:12.5px;color:var(--ink-soft);margin-bottom:14px;}
.explanation-box .src{font-size:10px;color:var(--gold);font-weight:700;margin-bottom:3px;letter-spacing:.08em;}

.btn-primary{font-family:inherit;font-size:13px;font-weight:700;padding:10px 22px;background:var(--ink);color:var(--paper);border:none;border-radius:3px;cursor:pointer;}
.btn-primary:hover{background:#3a4666;}
.btn-secondary{font-family:inherit;font-size:12px;font-weight:700;padding:8px 18px;background:transparent;color:var(--ink);border:1.5px solid var(--ink);border-radius:3px;cursor:pointer;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}

.score-card{text-align:center;background:#fff;border:1px solid var(--line);border-radius:4px;padding:26px 12px;margin-bottom:18px;}
.score-card .score-num{font-family:'Shippori Mincho',serif;font-size:40px;font-weight:800;}
.score-card .score-num span{font-size:18px;color:var(--ink-soft);}
.score-card .score-sub{font-size:11px;color:var(--ink-soft);margin-top:4px;}
.review-item{background:#fff;border:1px solid var(--line);border-left:4px solid var(--hanko);border-radius:4px;padding:11px 13px;margin-bottom:7px;font-size:12.5px;}
.review-item.skip-item{border-left-color:var(--wakaranai);}
.review-item .rv-stmt{font-weight:700;margin-bottom:4px;}
.review-item .rv-answer{font-size:11px;color:var(--ink-soft);margin-bottom:4px;}
.review-item .rv-exp{font-size:11.5px;color:var(--ink-soft);background:var(--paper-deep);border-radius:4px;padding:6px 8px;}

.empty-msg{background:#fff;border:1px dashed var(--line);border-radius:4px;padding:20px;text-align:center;color:var(--ink-soft);font-size:13px;}
footer.note{margin-top:28px;font-size:10.5px;color:var(--unseen);text-align:center;}

@media(max-width:660px){
  .sidebar{display:none;}
  .topnav{display:block;}
  .module-panel{padding:14px 12px;}
  .stamp-btn{width:72px;height:72px;font-size:26px;}
  .stamp-btn.wakaranai{padding:8px 14px;font-size:12px;}
}
</style>
</head>
<body>
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="app-title"><span class="logo-stamp">宅建</span>暗記道場</div>
      <div class="app-sub">全科目版</div>
    </div>
    <div class="sidebar-modules" id="sidebarModules"></div>
    <div class="sidebar-footer">
      <button id="exportWeakBtn">📋 苦手項目を書き出す</button>
      <button id="resetAllBtn">全科目の進捗をリセット</button>
    </div>
  </aside>

  <!-- TOPNAV (mobile) -->
  <nav class="topnav">
    <div class="topnav-head">
      <div class="app-title"><span class="logo-stamp">宅建</span>暗記道場 全科目</div>
    </div>
    <div class="topnav-tabs" id="topnavTabs"></div>
  </nav>

  <!-- MAIN -->
  <main class="main" id="mainArea"></main>
</div>

<!-- EDIT/ADD FACT MODAL -->
<div class="edit-modal-overlay" id="factModalOverlay">
  <div class="edit-modal" id="factModalBox"></div>
</div>

<!-- WEAK EXPORT MODAL -->
<div class="edit-modal-overlay" id="exportModalOverlay">
  <div class="edit-modal" id="exportModalBox" style="max-width:600px;"></div>
</div>

<script>
/* ============================================================
   MODULE METADATA
   ============================================================ */
const MODULE_META = [
  {key:"takken", label:"宅建業法",   stamp:"宅建", color:"#AE3B33"},
  {key:"horei",  label:"法令上の制限", stamp:"法令", color:"#3F6E5E"},
  {key:"kenri",  label:"権利関係",     stamp:"権利", color:"#4A6A9C"},
  {key:"zei",    label:"税・その他",   stamp:"税他", color:"#7A5C99"},
];

/* ============================================================
   ALL_MODULES DATA
   ============================================================ */
const ALL_MODULES = {
  "takken": {
    label: "宅建業法",
    stamp: "宅建",
    color: "#AE3B33",
    rawData: [
      { ch:"CH1", facts:[
        "道路・公園・河川・広場は宅地ではない",
        "取引の対象となる施設であれば、たとえそれが公共的なものでも宅建業法が定める「建物」になる",
        "信託会社は宅建業の免許はいらないが、国土交通大臣への届出が必要"
      ]},
      { ch:"CH2", facts:[
        "転貸（てんたい）は宅建業の免許不要",

        "免許の更新申請は、有効期間満了日の90日前から30日前までの間に行う",
        "宅建業の免許の有効期間は5年",
        "都道府県知事の免許を受けた業者でも、他の都道府県で宅建業を営むことができる。免許はあくまで事務所単位で必要",
        "宅建業者本人が死亡した場合、その相続人は死亡を知った日から30日以内にその旨を届け出なければならない",
        "合併により消滅した場合の廃業届は、合併後に消滅した会社の代表者であった者が行う",
        "免許取消しに関する聴聞の公示の日前60日以内にその法人の役員であった者は、取消しの日から5年間は免許を受けられない",
        "免許取消処分を受けると再取得に5年間のペナルティがあるが、業務停止処分にはそのようなペナルティはない"
      ]}
    ],
    questionBank: [
      { "factId": "CH1-0", "ch": "CH1", "statement": "現に道路として使用されている土地は、宅建業法上の宅地には該当しない。", "isTrue": true, "explanation": "道路・公園・河川・広場は宅建業法上の宅地ではない。" },
      { "factId": "CH1-0", "ch": "CH1", "statement": "都市計画法上の用途地域内にある土地であれば、現に公園として利用されていても宅建業法上の宅地に該当する。", "isTrue": false, "explanation": "公園として現に利用されている土地は宅地に該当しない。" },
      { "factId": "CH1-1", "ch": "CH1", "statement": "取引の対象となる施設であれば、公共的な施設であっても宅建業法上の「建物」に該当する場合がある。", "isTrue": true, "explanation": "取引対象の施設は、公共的なものでも宅建業法上の建物となる。" },
      { "factId": "CH1-2", "ch": "CH1", "statement": "信託会社が宅建業を営む場合、宅建業の免許を受ける必要はないが、国土交通大臣への届出が必要である。", "isTrue": true, "explanation": "信託会社は免許不要だが国土交通大臣への届出が必要。" }
    ]
  },
  "horei": {
    label: "法令上の制限", stamp: "法令", color: "#3F6E5E",
    rawData: [{ ch:"CH1", facts:["区域区分（市街化区域・市街化調整区域の区分）は「必要があるとき」に「都道府県」が定めることができる"]}],
    questionBank: [{ "factId": "CH1-0", "ch": "CH1", "statement": "区域区分は、必要があると認めるときに「都道府県」が定めることができる。", "isTrue": true, "explanation": "区域区分は必要時に都道府県が定める。" }]
  },
  "kenri": {
    label: "権利関係", stamp: "権利", color: "#4A6A9C",
    rawData: [{ ch:"CH1", facts:["未成年者が行った法律行為であっても、単に権利を得るまたは義務を免れる法律行為は取り消すことができない"]}],
    questionBank: [{ "factId": "CH1-0", "ch": "CH1", "statement": "未成年者が行った法律行為であっても、単に権利を得るだけの行為は取り消すことができない。", "isTrue": true, "explanation": "単に権利を得る行為は未成年でも単独で有効。" }]
  },
  "zei": {
    label: "税・その他", stamp: "税他", color: "#7A5C99",
    rawData: [{ ch:"CH1", facts:["不動産取得税と固定資産税はどちらも地方税である"]}],
    questionBank: [{ "factId": "CH1-0", "ch": "CH1", "statement": "不動産取得税と固定資産税はどちらも地方税である。", "isTrue": true, "explanation": "不動産取得税・固定資産税はともに地方税。" }]
  }
};

/* ============================================================
   STATE & STORAGE
   ============================================================ */
let globalStatusMap = {};
let globalWrongPool = [];
let globalStreakMap = {}; // 連続正解数の保持
let customStore = {};

const moduleState = {};
function initModuleState(key){
  if(moduleState[key]) return;
  moduleState[key]={currentQuiz:null,lastResults:null,currentView:'dashboard'};
}

function getStatus(key, factId){ return globalStatusMap[key+':'+factId]||'unseen'; }
function setStatus(key, factId, val){ globalStatusMap[key+':'+factId]=val; }

function emptyCustomModule(){ return { edits:{}, addedFacts:[], addedQuestions:[] }; }
function getCustomModule(key){
  if(!customStore[key]) customStore[key]=emptyCustomModule();
  return customStore[key];
}
function getCustomEdit(key, factId){
  const m=customStore[key];
  if(!m || !m.edits) return null;
  return Object.prototype.hasOwnProperty.call(m.edits, factId) ? m.edits[factId] : null;
}
function getCustomFacts(key){ return (customStore[key] && customStore[key].addedFacts) ? customStore[key].addedFacts : []; }
function getCustomQuestions(key){ return (customStore[key] && customStore[key].addedQuestions) ? customStore[key].addedQuestions : []; }

function saveLocal(){
  try{
    localStorage.setItem('quiz_status_map', JSON.stringify(globalStatusMap));
    localStorage.setItem('quiz_wrong_pool', JSON.stringify(globalWrongPool));
    localStorage.setItem('quiz_custom_store', JSON.stringify(customStore));
    localStorage.setItem('quiz_streak_map', JSON.stringify(globalStreakMap));
  }catch(e){}
}
function loadLocal(){
  try{
    const sm = localStorage.getItem('quiz_status_map');
    const wp = localStorage.getItem('quiz_wrong_pool');
    const cs = localStorage.getItem('quiz_custom_store');
    const st = localStorage.getItem('quiz_streak_map');
    if(sm) globalStatusMap = JSON.parse(sm);
    if(wp) globalWrongPool = JSON.parse(wp);
    if(cs) customStore = JSON.parse(cs);
    if(st) globalStreakMap = JSON.parse(st);
  }catch(e){}
}
function persistProgress(){ saveLocal(); }

/* ============================================================
   FACTS HELPER
   ============================================================ */
function getFacts(key){
  const facts=[];
  if(ALL_MODULES[key] && ALL_MODULES[key].rawData){
    ALL_MODULES[key].rawData.forEach((chap,ci)=>{
      chap.facts.forEach((text,fi)=>{
        const id=chap.ch+'-'+fi;
        const editedText=getCustomEdit(key,id);
        facts.push({id, ch:chap.ch, chIndex:ci, text: editedText!==null ? editedText : text});
      });
    });
  }
  const custom=getCustomFacts(key);
  custom.forEach(c=>{ facts.push({id:c.id, ch:c.ch, chIndex:9999, text:c.text, isCustom:true}); });
  return facts;
}

/* ============================================================
   NAVIGATION & RENDER
   ============================================================ */
let currentModule='takken';
function switchModule(key){
  currentModule=key;
  document.querySelectorAll('.mod-btn').forEach(b=>{
    const a=b.dataset.key===key;
    b.classList.toggle('active',a);
    b.style.borderLeftColor = a ? ALL_MODULES[key].color : 'transparent';
  });
  document.querySelectorAll('.topnav-tab').forEach(b=>b.classList.toggle('active',b.dataset.key===key));
  document.querySelectorAll('.module-panel').forEach(p=>p.classList.toggle('active',p.dataset.key===key));
  renderView(key, moduleState[key]?.currentView||'dashboard');
}

function showView(key, name){
  moduleState[key].currentView=name;
  const panel=document.querySelector(`.module-panel[data-key="${key}"]`);
  panel.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  panel.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.view===name));
  const view=panel.querySelector(`#${key}-view-${name}`);
  if(view) view.classList.add('active');
  if(name==='dashboard') renderDashboard(key);
  if(name==='browse') renderBrowse(key);
}
function renderView(key,name){showView(key,name);}

/* ============================================================
   BUILD MODULE PANEL & DASHBOARD
   ============================================================ */
function buildModulePanel(key){
  const meta=MODULE_META.find(m=>m.key===key);
  const panel=document.createElement('div');
  panel.className='module-panel';
  panel.dataset.key=key;
  panel.innerHTML=`
    <div class="app-head">
      <div class="eyebrow" style="color:${meta.color}">${meta.label} / 暗記道場</div>
      <h1><span class="stamp" style="border-color:${meta.color};color:${meta.color}">${meta.stamp}</span>${meta.label}</h1>
      <p class="sub">○×クイズで${meta.label}を攻略しよう</p>
      <button class="reset-link" data-reset="${key}">進捗をリセット</button>
    </div>
    <nav class="tabs">
      <button data-view="dashboard" class="active">ダッシュボード</button>
      <button data-view="browse">項目を見る</button>
      <button data-view="quiz">クイズ</button>
      <button data-view="results">結果</button>
    </nav>
    <div class="view active" id="${key}-view-dashboard">
      <h2 class="section-title">進捗状況</h2>
      <div class="stat-grid" id="${key}-statGrid"></div>
      <h2 class="section-title">クイズを始める（1回最大20問）</h2>
      <div class="launch-grid" id="${key}-launchGrid"></div>
      <h2 class="section-title">章ごとの定着度</h2>
      <div id="${key}-chapterProgress"></div>
    </div>
    <div class="view" id="${key}-view-browse">
      <h2 class="section-title">項目を見る・分類する</h2>
      <p style="font-size:11.5px;color:var(--ink-soft);margin-top:-4px;">各項目を「苦手」「分かった」「未学習」に分けられます。2回連続で正解すると自動的に「分かった」になります。</p>
      <div id="${key}-browseList" style="margin-top:12px;"></div>
    </div>
    <div class="view" id="${key}-view-quiz"><div id="${key}-quizArea"></div></div>
    <div class="view" id="${key}-view-results"><div id="${key}-resultsArea"></div></div>
  `;
  panel.querySelectorAll('nav.tabs button').forEach(b=>{
    b.addEventListener('click',()=>showView(key,b.dataset.view));
  });
  panel.querySelector(`[data-reset="${key}"]`).addEventListener('click',()=>{
    if(!confirm(`「${meta.label}」の進捗をリセットします。よろしいですか？`)) return;
    const FACTS=getFacts(key);
    FACTS.forEach(f=>{ 
      delete globalStatusMap[key+':'+f.id];
      delete globalStreakMap[key+':'+f.id];
    });
    globalWrongPool=globalWrongPool.filter(w=>w.moduleKey!==key);
    persistProgress();
    renderDashboard(key);
  });
  return panel;
}

function renderDashboard(key){
  const FACTS=getFacts(key);
  const total=FACTS.length;
  let weak=0,known=0,unseen=0;
  FACTS.forEach(f=>{
    const s=getStatus(key,f.id);
    if(s==='weak')weak++; else if(s==='known')known++; else unseen++;
  });

  document.getElementById(`${key}-statGrid`).innerHTML=`
    <div class="stat-card"><div class="num">${total}</div><div class="label">全項目数</div></div>
    <div class="stat-card weak"><div class="num">${weak}</div><div class="label">苦手</div></div>
    <div class="stat-card unseen"><div class="num">${unseen}</div><div class="label">未学習</div></div>
    <div class="stat-card known"><div class="num">${known}</div><div class="label">分かっている</div></div>
  `;

  const myWrong=globalWrongPool.filter(w=>w.moduleKey===key);
  const weakPool=FACTS.filter(f=>getStatus(key,f.id)==='weak');
  const unseenPool=FACTS.filter(f=>getStatus(key,f.id)==='unseen');
  const launchGrid=document.getElementById(`${key}-launchGrid`);
  launchGrid.innerHTML='';
  [
    {mode:'all',    title:'すべての項目から',  desc:`全${total}項目からランダムに出題`, pool:FACTS},
    {mode:'weak',   title:'「苦手」な項目だけ', desc:'苦手マークの項目を重点的に出題',   pool:weakPool},
    {mode:'unseen', title:'「未学習」の項目だけ',desc:'未分類の項目から出題',             pool:unseenPool},
    {mode:'review', title:'間違えた問題だけ復習',desc:'過去に間違えた・分からなかった問題', pool:myWrong},
  ].forEach(c=>{
    const btn=document.createElement('button');
    btn.className='launch-card';
    const cnt=c.mode==='review'?myWrong.length:Math.min(20,c.pool.length*2||0);
    btn.disabled=(c.mode==='review'?myWrong.length:c.pool.length)===0;
    btn.innerHTML=`
      <div class="lc-title">${c.title}<span class="lc-count">${cnt}問</span></div>
      <div class="lc-desc">${c.desc}${c.mode!=='review'&&c.pool.length>0?`（対象${c.pool.length}項目）`:''}</div>
    `;
    btn.addEventListener('click',()=>startQuiz(key,c.mode));
    launchGrid.appendChild(btn);
  });

  const prog=document.getElementById(`${key}-chapterProgress`);
  prog.innerHTML='';
  if(ALL_MODULES[key] && ALL_MODULES[key].rawData){
    ALL_MODULES[key].rawData.forEach(chap=>{
      const items=FACTS.filter(f=>f.ch===chap.ch);
      if(!items.length) return;
      const w=items.filter(f=>getStatus(key,f.id)==='weak').length;
      const k=items.filter(f=>getStatus(key,f.id)==='known').length;
      const u=items.length-w-k;
      const row=document.createElement('div');
      row.className='chapter-row';
      row.innerHTML=`
        <div class="ch-name">${chap.ch}</div>
        <div class="ch-bar">
          <span style="background:#3F6E5E;width:${k/items.length*100}%"></span>
          <span style="background:#AE3B33;width:${w/items.length*100}%"></span>
          <span style="background:var(--unseen);width:${u/items.length*100}%"></span>
        </div>
        <div class="ch-count">${k}/${items.length}</div>
      `;
      prog.appendChild(row);
    });
  }

  const sBtn=document.querySelector(`.mod-btn[data-key="${key}"] .mod-count`);
  if(sBtn) sBtn.textContent=`${known}/${total}`;
}

function renderBrowse(key){
  const FACTS=getFacts(key);
  const container=document.getElementById(`${key}-browseList`);
  container.innerHTML='';

  if(ALL_MODULES[key] && ALL_MODULES[key].rawData){
    ALL_MODULES[key].rawData.forEach(chap=>{
      const items=FACTS.filter(f=>f.ch===chap.ch);
      if(!items.length) return;
      const known=items.filter(f=>getStatus(key,f.id)==='known').length;
      const det=document.createElement('details');
      det.className='chapter-block';
      const sum=document.createElement('summary');
      sum.innerHTML=`<span>${chap.ch}</span><span class="ch-tally">${known}/${items.length} 既習</span>`;
      det.appendChild(sum);
      items.forEach(f=> det.appendChild(buildFactRow(key, f)));
      container.appendChild(det);
    });
  }
}

function buildFactRow(key, f){
  const s=getStatus(key,f.id);
  const row=document.createElement('div');
  row.className='fact-row';
  row.innerHTML=`
    <div class="fact-text">${f.text}</div>
    <div class="fact-controls">
      <button class="status-btn ${s==='weak'?'sel-weak':''}" data-action="weak">苦手</button>
      <button class="status-btn ${s==='known'?'sel-known':''}" data-action="known">分かった</button>
      <button class="status-btn ${s==='unseen'?'sel-unseen':''}" data-action="unseen">未学習に戻す</button>
    </div>
  `;
  row.querySelectorAll('.status-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      setStatus(key,f.id,btn.dataset.action);
      if(btn.dataset.action !== 'known') {
        globalStreakMap[key+':'+f.id] = 0; // 手動変更時は連続正解カウントリセット
      }
      persistProgress();
      renderBrowse(key);
    });
  });
  return row;
}

/* ============================================================
   QUIZ LOGIC (2回連続正解で「分かった」へ)
   ============================================================ */
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function generateQuiz(key, factsPool, total){
  const ids=new Set(factsPool.map(f=>f.id));
  const builtIn=(ALL_MODULES[key].questionBank||[]).filter(q=>ids.has(q.factId));
  const custom=getCustomQuestions(key).filter(q=>ids.has(q.factId));
  const cands=builtIn.concat(custom);
  return shuffle(cands).slice(0,total).map((q,i)=>({
    id:'q'+Date.now()+'_'+i,
    factId:q.factId, statement:q.statement, isTrue:!!q.isTrue,
    explanation:q.explanation, ch:q.ch, moduleKey:key
  }));
}

function startQuiz(key, mode){
  showView(key,'quiz');
  const FACTS=getFacts(key);
  const myWrong=globalWrongPool.filter(w=>w.moduleKey===key);
  let factsPool, questions;

  if(mode==='review'){
    if(!myWrong.length){alert('復習する問題がありません。');return;}
    questions=shuffle(myWrong).slice(0,Math.min(20,myWrong.length));
    moduleState[key].currentQuiz={questions,index:0,answers:[],mode};
    renderQuestion(key);
    return;
  }
  if(mode==='all')      factsPool=FACTS;
  else if(mode==='weak')  factsPool=FACTS.filter(f=>getStatus(key,f.id)==='weak');
  else if(mode==='unseen')factsPool=FACTS.filter(f=>getStatus(key,f.id)==='unseen');

  if(!factsPool||!factsPool.length){alert('対象となる項目がありません。');showView(key,'dashboard');return;}
  questions=generateQuiz(key,factsPool,Math.min(20,factsPool.length*2));
  if(!questions.length){alert('対象となる問題がありません。');showView(key,'dashboard');return;}
  moduleState[key].currentQuiz={questions,index:0,answers:[],mode};
  renderQuestion(key);
}

function renderQuestion(key){
  const {questions,index}=moduleState[key].currentQuiz;
  const q=questions[index];
  const pct=(index/questions.length)*100;
  document.getElementById(`${key}-quizArea`).innerHTML=`
    <div class="quiz-progress">問題 ${index+1} / ${questions.length}</div>
    <div class="quiz-progress-bar"><span style="width:${pct}%"></span></div>
    <div class="quiz-tag">${q.ch||''}</div>
    <div class="question-card"><div class="stmt">${q.statement}</div></div>
    <div class="answer-buttons">
      <button class="stamp-btn maru"      id="${key}-btnMaru">○</button>
      <button class="stamp-btn wakaranai" id="${key}-btnWakaran">分からない</button>
      <button class="stamp-btn batsu"     id="${key}-btnBatsu">×</button>
    </div>
    <div id="${key}-feedbackArea"></div>
  `;
  document.getElementById(`${key}-btnMaru`).addEventListener('click',()=>answer(key,true,false));
  document.getElementById(`${key}-btnBatsu`).addEventListener('click',()=>answer(key,false,false));
  document.getElementById(`${key}-btnWakaran`).addEventListener('click',()=>answer(key,null,true));
}

function answer(key, userAnswer, isSkip){
  const {questions,index,answers}=moduleState[key].currentQuiz;
  const q=questions[index];
  const correct = isSkip ? false : (userAnswer===q.isTrue);
  answers.push({q, userAnswer, correct, isSkip});

  [`${key}-btnMaru`,`${key}-btnBatsu`,`${key}-btnWakaran`].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.disabled=true;
  });

  let bannerClass = isSkip ? 'skip' : (correct ? 'correct' : 'wrong');
  let bannerText  = isSkip ? `分からない 正解は「${q.isTrue?'○':'×'}」` : (correct ? '正解！' : `不正解… 正解は「${q.isTrue?'○':'×'}」`);

  document.getElementById(`${key}-feedbackArea`).innerHTML=`
    <div class="result-banner ${bannerClass}">${bannerText}</div>
    <div class="explanation-box"><div class="src">${q.ch}</div>${q.explanation}</div>
    <button class="btn-primary" id="${key}-nextBtn">${index+1<questions.length?'次の問題へ':'結果を見る'}</button>
  `;
  document.getElementById(`${key}-nextBtn`).addEventListener('click',()=>nextQuestion(key));
}

function nextQuestion(key){
  const state=moduleState[key];
  state.currentQuiz.index++;
  if(state.currentQuiz.index<state.currentQuiz.questions.length){
    renderQuestion(key);
  } else {
    finishQuiz(key);
  }
}

function finishQuiz(key){
  const {answers}=moduleState[key].currentQuiz;
  let correctCount=0;

  answers.forEach(a=>{
    const factKey = key + ':' + a.q.factId;

    if(a.correct){
      correctCount++;
      globalWrongPool=globalWrongPool.filter(w=>!(w.statement===a.q.statement&&w.moduleKey===key));

      if(a.q.factId){
        const currentStreak = (globalStreakMap[factKey] || 0) + 1;
        globalStreakMap[factKey] = currentStreak;

        // 2回連続正解で「分かった (known)」に分類
        if(currentStreak >= 2){
          setStatus(key, a.q.factId, 'known');
        }
      }
    } else {
      // 不正解 or 分からない → 連続正解リセット＆苦手に分類
      if(a.q.factId){
        globalStreakMap[factKey] = 0;
        setStatus(key, a.q.factId, 'weak');
      }
      const exists=globalWrongPool.some(w=>w.statement===a.q.statement&&w.moduleKey===key);
      if(!exists){
        globalWrongPool.push({
          id:a.q.id, factId:a.q.factId, statement:a.q.statement,
          isTrue:a.q.isTrue, explanation:a.q.explanation,
          ch:a.q.ch, moduleKey:key, isSkip: a.isSkip||false
        });
      }
    }
  });

  persistProgress();
  moduleState[key].lastResults={answers,correctCount,total:answers.length};
  renderResults(key);
}

function renderResults(key){
  showView(key,'results');
  const {answers,correctCount,total}=moduleState[key].lastResults;
  const myWrong=globalWrongPool.filter(w=>w.moduleKey===key);

  let html=`
    <h2 class="section-title">結果</h2>
    <div class="score-card">
      <div class="score-num">${correctCount} <span>/ ${total}</span></div>
    </div>
  `;
  const notCorrect=answers.filter(a=>!a.correct);
  if(notCorrect.length){
    html+=`<h2 class="section-title">復習問題</h2>`;
    notCorrect.forEach(a=>{
      html+=`<div class="review-item">
        <div class="rv-stmt">${a.q.statement}</div>
        <div class="rv-exp">${a.q.explanation}</div>
      </div>`;
    });
  }
  html+=`<div class="btn-row">
    <button class="btn-primary" id="${key}-backDash">ダッシュボードに戻る</button>
  </div>`;
  document.getElementById(`${key}-resultsArea`).innerHTML=html;
  document.getElementById(`${key}-backDash`).addEventListener('click',()=>showView(key,'dashboard'));
}

/* ============================================================
   WEAK EXPORT
   ============================================================ */
function buildWeakText(filterKey){
  const lines = [];
  MODULE_META.forEach(meta=>{
    if(filterKey !== 'all' && filterKey !== meta.key) return;
    const FACTS = getFacts(meta.key);
    const weakFacts = FACTS.filter(f=>getStatus(meta.key, f.id)==='weak');
    if(!weakFacts.length) return;
    lines.push(`■ ${meta.label}（${weakFacts.length}項目）`);
    weakFacts.forEach((f, i)=>{ lines.push(`${i+1}. ${f.text}`); });
    lines.push('');
  });
  return lines.join('\n').trim();
}

function openExportModal(){
  const overlay = document.getElementById('exportModalOverlay');
  const box = document.getElementById('exportModalBox');
  overlay.classList.add('show');
  const txt = buildWeakText('all');
  box.innerHTML = `
    <h3>📋 苦手項目の書き出し</h3>
    <textarea class="export-text" readonly>${txt || '苦手項目はありません。'}</textarea>
    <div class="btn-row"><button class="btn-secondary" id="closeExportBtn">閉じる</button></div>
  `;
  box.querySelector('#closeExportBtn').addEventListener('click',()=>{ overlay.classList.remove('show'); });
}

/* ============================================================
   GLOBAL RESET & INIT
   ============================================================ */
document.getElementById('resetAllBtn').addEventListener('click',()=>{
  if(!confirm('全科目の進捗をリセットします。よろしいですか？')) return;
  globalStatusMap={};
  globalWrongPool=[];
  globalStreakMap={};
  persistProgress();
  switchModule(currentModule);
});

(function init(){
  loadLocal();

  const mainArea=document.getElementById('mainArea');
  const sidebarModules=document.getElementById('sidebarModules');
  const topnavTabs=document.getElementById('topnavTabs');

  for(const meta of MODULE_META){
    const key=meta.key;
    initModuleState(key);
    mainArea.appendChild(buildModulePanel(key));

    const FACTS=getFacts(key);
    const known=FACTS.filter(f=>getStatus(key,f.id)==='known').length;
    const btn=document.createElement('button');
    btn.className='mod-btn';btn.dataset.key=key;
    btn.innerHTML=`<span class="mod-stamp" style="border-color:${meta.color};color:${meta.color}">${meta.stamp}</span>${meta.label}<span class="mod-count">${known}/${FACTS.length}</span>`;
    btn.addEventListener('click',()=>switchModule(key));
    sidebarModules.appendChild(btn);

    const tab=document.createElement('button');
    tab.className='topnav-tab';tab.dataset.key=key;tab.textContent=meta.label;
    tab.addEventListener('click',()=>switchModule(key));
    topnavTabs.appendChild(tab);
  }

  switchModule('takken');
  document.getElementById('exportWeakBtn').addEventListener('click', openExportModal);
})();
</script>
